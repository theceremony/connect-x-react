<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>connext-x-game</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bitcount:wght@100..900&family=Pixelify+Sans:wght@400..700&family=VT323&display=swap");
      body {
        background-color: #242424;
      }
      :root {
        font-family:
          "Pixelify Sans", system-ui, Avenir, Helvetica, Arial, sans-serif;
        line-height: 1.5;
        font-weight: 400;

        color: rgba(255, 255, 255, 0.87);
        background-color: #242424;

        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      * {
        box-sizing: border-box;
      }
      /* Basic styling for the loader container to center the spinner */
      #pre-logo {
        width: 60vw;
        max-width: 600px;
      }
      #early-loader {
        position: fixed;
        display: flex;
        flex-direction: column;
        z-index: 100;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(20, 20, 20, 1);
        justify-content: center;
        align-items: center;
        /* -webkit-backdrop-filter: blur(5px); */
        /* backdrop-filter: blur(3px); */
        gap: 1vw;
        padding: 3vw;
        border: 10px solid white;
        /* border-radius: 30px; */
        transition: all 1s; /* Or your preferred background color */
      }
      /* Add your specific spinner CSS (e.g., keyframes for animation) */
    </style>
  </head>
  <body>
    <div id="early-loader">
      <!-- You can use a simple text loader, an SVG spinner, or a CSS animation -->
      <img src="logo.gif" id="pre-logo" alt="ConeXT" />
      <h1>Loading</h1>
    </div>
    <div id="root">
      <!-- Preloader HTML goes here -->
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
